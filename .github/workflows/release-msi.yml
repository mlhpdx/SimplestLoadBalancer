name: Release MSI

on: 
  workflow_dispatch:
  release: 
    types:
      - created

jobs:
  publish:
    runs-on: windows-latest    
    strategy:
      fail-fast: false
      matrix:
        rid: [x64, arm64]
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Get the Tagged Version
      id: get_version
      shell: bash
      run: |
        echo "VERSION=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        echo "RELEASE_ID=$(jq --raw-output '.release.id' $GITHUB_EVENT_PATH)" >> "$GITHUB_OUTPUT"
    - name: Publish for OS
      run: dotnet publish SimplestLoadBalancer.csproj -o ./publish/win-${{ matrix.rid }} -c Release -r win-${{ matrix.rid }} /p:Version=${{ github.ref_name }}
    - name: Zip it Up
      run: tar -a -c -f SimplestLoadBalancer-${{ github.ref_name }}-win-${{ matrix.rid }}.zip -C ./publish/win-${{ matrix.rid }} .
    - name: Upload ZIP to Release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ github.ref_name }}
        FILE: SimplestLoadBalancer-${{ github.ref_name }}-win-${{ matrix.rid }}.zip
        URL: https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.get_version.outputs.RELEASE_ID }}/assets?name=SimplestLoadBalancer-${{ github.ref_name }}-win-${{ matrix.rid }}.zip
      run: |
        echo $VERSION
        echo $URL
        AUTH="Authorization: token $GITHUB_TOKEN"
        echo $AUTH
        curl -sSL -XPOST -H "$AUTH" --upload-file "$FILE" --header "Content-Type:application/octet-stream" --write-out "%{http_code}" --output $(mktemp) "$URL"
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v3
    - name: Install WiX
      run: |
        dotnet tool install --global wix --version "4.0.6"
        wix extension add WixToolset.UI.wixext/4.0.6
        wix extension add WixToolset.Firewall.wixext/4.0.6
    - name: Build WiX on Windows
      run: wix build package.wxs -arch ${{ matrix.rid }} -define Version=${{ github.ref_name }} -define PublishDir=./publish/win-${{ matrix.rid }} -o SimplestLoadBalancer-${{ github.ref_name }}-win-${{ matrix.rid }}.msi -ext WixToolset.UI.wixext -ext WixToolset.Firewall.wixext
    - name: Upload MSI to Releaase
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VERSION: ${{ github.ref_name }}
        FILE: SimplestLoadBalancer-${{ github.ref_name }}-win-${{ matrix.rid }}.msi
        URL: https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.get_version.outputs.RELEASE_ID }}/assets?name=SimplestLoadBalancer-${{ github.ref_name }}-win-${{ matrix.rid }}.msi
      run: |
        echo $VERSION
        echo $URL
        AUTH="Authorization: token $GITHUB_TOKEN"
        echo $AUTH
        curl -sSL -XPOST -H "$AUTH" --upload-file "$FILE" --header "Content-Type:application/octet-stream" --write-out "%{http_code}" --output $(mktemp) "$URL"
  winget:
    permissions:
      pull-requests: write
      contents: write
    needs: publish
    runs-on: windows-latest
    steps:
    - name: update
      shell: pwsh
      env: 
        VERSION: ${{ github.ref_name }}
        WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        URL_X64: https://github.com/mlhpdx/SimplestLoadBalancer/releases/download/${{ github.ref_name }}/SimplestLoadBalancer-${{ github.ref_name }}-win-x64.msi
        URL_ARM64: https://github.com/mlhpdx/SimplestLoadBalancer/releases/download/${{ github.ref_name }}/SimplestLoadBalancer-${{ github.ref_name }}-win-arm64.msi
      run: |
        iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
        ./wingetcreate update mlhpdx.SimplestLoadBalancer -s -v ${{ env.VERSION }} -u ${{ env.URL_X64 }} ${{ env.URL_ARM64 }}
        
